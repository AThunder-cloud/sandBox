<nav class="container-fluid flex flex-column w-full h-full bg-sidebar">
  
  <ul class="flex flex-column pl-0 m-0 gap-1 list-none overflow-y-auto pt-4 sidebar-nav" 
      [ngClass]="{'is-expanded': expandSideBar}">
    @for (route of routeItems; track route.path) {
      <li class="px-2 flex-shrink-0 il-nav">
        <a 
          class="nav-link flex align-items-center gap-3 p-3 border-round text-color-secondary hover:surface-100 hover:text-color transition-colors transition-duration-150 p-ripple cursor-pointer"
          (click)="triggerSlideAnimation()"
          [routerLink]="route.path ? [route.path] : null"
          routerLinkActive="active-route"
          [routerLinkActiveOptions]="{ exact: route.path === '/' || route.path === '' }"
          pRipple
        >
          <i [ngClass]="route.icon" class="text-xl"></i>
          <span class="route-name" [ngClass]="{'show-expanded': expandSideBar}">
            {{ route.title }}
          </span>
        </a>
      </li>
    }
  </ul>

  <div class="mt-auto flex flex-column px-2 pb-4 sidebar-footer" [ngClass]="{'is-expanded': expandSideBar}">
    <hr class="mb-3 mx-2 border-top-1 border-none surface-border" />
    <button class="nav-link flex align-items-center gap-3 p-3 border-round w-full border-none bg-transparent text-color-secondary hover:surface-100 hover:text-color transition-colors transition-duration-150 p-ripple cursor-pointer" 
            pRipple 
            (click)="logout()">
      <i class="pi pi-sign-out text-xl active-route"></i>
      <span class="route-name" [ngClass]="{'show-expanded': expandSideBar}">Logout</span>
    </button>
  </div>
</nav>
@if (showSlide) {
  <div class="slide-overlay"></div>
}

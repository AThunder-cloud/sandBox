<section class="container-fluid px-0 h-screen w-screen flex flex-col">
  <div class="bg-wrapper position-relative">
    <div class="login-card-wrapper surface">
      <div class="card">
        <div class="flex justify-content-center align-items-center">
          <app-typewriter
            text="Hello, Welcome to SandBox "
            [duration]="5"
            [restartDelay]="5000"
          />
        </div>

        <p-button (click)="login()" class="px-4 py-2 bg-blue-500 text-white rounded-lg btn">
          Sign in with Google
        </p-button>
      </div>
    </div>
  </div>
</section>
